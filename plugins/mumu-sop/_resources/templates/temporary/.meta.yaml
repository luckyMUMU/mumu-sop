# 元数据模板

# 文件位置: .sop/specs/{change-id}/.meta.yaml
# 用途: 追踪临时节点状态、约束引用、时间戳等元数据

---
# 唯一标识
change_id: CHG-YYYYMMDD-NNN

# 基本信息
name: "[变更名称]"
description: "[变更描述]"

# 状态管理
status: draft | proposed | in_design | designing | ready_for_impl | implementing | verifying | completed | archived

# 时间戳
created: YYYY-MM-DDTHH:MM:SSZ
updated: YYYY-MM-DDTHH:MM:SSZ
started_at: null | YYYY-MM-DDTHH:MM:SSZ
completed_at: null | YYYY-MM-DDTHH:MM:SSZ
archived_at: null | YYYY-MM-DDTHH:MM:SSZ

# 复杂度和深度
complexity: low | medium | high
estimated_depth: 2 | 3 | 4
actual_depth: null | 2 | 3 | 4

# 复杂度因子（自动计算）
complexity_factors:
  task_count: 0
  code_change_lines: 0
  module_count: 0
  dependency_change: 0
  security_impact: none | indirect | direct

# 约束树引用
constraint_references:
  p0_node: null | "P0-XXX"          # 引用的 P0 约束节点
  p1_node: null | "P1-XXX"          # 引用的 P1 约束节点
  p2_node: null | "P2-XXX"          # 引用的 P2 约束节点
  p3_node: null | "P3-XXX"          # 引用的 P3 约束节点

# 依赖子树引用
dependency_references: []

# 文件清单
artifacts:
  proposal: true | false
  design: true | false
  requirements: true | false
  scenarios: true | false
  tasks: true | false
  checklist: true | false

# 任务统计
task_statistics:
  total: 0
  completed: 0
  in_progress: 0
  pending: 0
  blocked: 0
  parallel_groups: 0

# 护栏检查结果
guardrail_results:
  p0:
    status: pending | passed | failed
    checked_at: null | YYYY-MM-DDTHH:MM:SSZ
    violations: []
  p1:
    status: pending | passed | failed
    checked_at: null | YYYY-MM-DDTHH:MM:SSZ
    violations: []
  p2:
    status: pending | passed | failed
    checked_at: null | YYYY-MM-DDTHH:MM:SSZ
    violations: []
  p3:
    status: pending | passed | failed
    checked_at: null | YYYY-MM-DDTHH:MM:SSZ
    violations: []

# 路径兼容性
paths:
  primary: ".sop/specs/{change-id}/"
  compatible:
    - ".trae/specs/{change-id}/"

# 用户确认
approvals:
  design_approved: false
  design_approved_at: null
  design_approved_by: null
  implementation_approved: false
  implementation_approved_at: null
  implementation_approved_by: null

# 归档信息
archive_info:
  archived: false
  archived_at: null
  archive_path: null
  constraint_updates: []
  changelog_updated: false

# 关联决策记录
decision_records: []
---

# 元数据字段说明

## 状态流转

```
draft                    # 草稿状态
  ↓
proposed                 # 已提交提案
  ↓
in_design                # 开始设计
  ↓
designing                # 设计进行中
  ↓
ready_for_impl           # 设计完成，准备实现
  ↓
implementing             # 实现进行中
  ↓
verifying                # 验证进行中
  ↓
completed                # 完成但未归档
  ↓
archived                 # 已归档
```

## 复杂度评估规则

复杂度基于以下因子自动计算：

| 因子 | 权重 | 低 | 中 | 高 |
|------|------|-----|-----|-----|
| task_count | 0.3 | 1-3 | 4-10 | >10 |
| code_change_lines | 0.25 | <100 | 100-500 | >500 |
| module_count | 0.2 | 1 | 2-3 | >3 |
| dependency_change | 0.15 | 0 | 1-2 | >2 |
| security_impact | 0.1 | none | indirect | direct |

深度映射：
- 低复杂度 → depth: 2 (P0 + P1)
- 中复杂度 → depth: 3 (P0 + P1 + P2)
- 高复杂度 → depth: 4 (P0 + P1 + P2 + P3)

## 约束引用关系

```mermaid
graph TB
    P0[P0 节点] --> P1[P1 节点]
    P1 --> P2[P2 节点]
    P2 --> P3[P3 节点]
    P3 -.->|"引用"| TEMP[临时节点]

    TEMP --> META[.meta.yaml]
    META --> |"constraint_references"| P3
```

## 依赖子树引用格式

```yaml
dependency_references:
  - dependency_id: DEP-react
    path: ".sop/specs/dependencies/DEP-react/"
    version: "18.2.0"
    readonly: true
  - dependency_id: DEP-axios
    path: ".sop/specs/dependencies/DEP-axios/"
    version: "1.6.0"
    readonly: true
```

## 护栏违规记录格式

```yaml
guardrail_results:
  p0:
    status: failed
    checked_at: "2026-03-24T10:00:00Z"
    violations:
      - constraint_id: "P0-SEC-001"
        message: "发现硬编码密钥"
        severity: blocker
        file: "src/config.ts"
        line: 42
```

## 决策记录关联格式

```yaml
decision_records:
  - decision_id: DEC-20260324-001
    type: constraint_conflict
    path: "contracts/decisions/DEC-20260324-001.yaml"
    decided_at: "2026-03-24T10:00:00Z"
```