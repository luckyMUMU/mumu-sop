      item: "更新文档"
      required: true
    - id: "SC-015"
      item: "团队通知"
      required: true
```

## 部署策略

```yaml
deployment_strategies:
  canary:
    description: "金丝雀发布"
    steps:
      - "部署到新实例"
      - "路由 1% 流量"
      - "监控关键指标"
      - "逐步增加流量"
    rollback_trigger: "错误率 > 0.1% 或 P99 延迟 > 基准 120%"

  staged:
    description: "分阶段发布"
    steps:
      - "按区域/用户组分批部署"
      - "每批验证后进入下一批"
    rollback_trigger: "任一批次验证失败"

  full:
    description: "全量发布"
    steps:
      - "一次性全量部署"
    rollback_trigger: "部署后健康检查失败"
    note: "仅适用于低风险变更"
```

## 回滚契约

```yaml
rollback_contract:
  trigger_conditions:
    - "错误率超过阈值"
    - "关键功能异常"
    - "性能严重下降"
    - "用户投诉激增"

  max_rollback_time: "5 minutes"

  data_compatibility: "forward_compatible"

  rollback_outputs:
    - name: "rollback_record"
      type: object
      path: "contracts/stage-5-rollback.json"
      format:
        rollback_id: "回滚ID"
        triggered_at: "触发时间"
        reason: "回滚原因"
        completed_at: "完成时间"
```

