# Mumu Model Router Configuration

model_routing:
  default_model: kimi-k2.5

  # Agent 模型映射
  agent_models:
    fast-responder: qwen3-coder-next
    code-implementer-router: kimi-k2.5
    architect-decider: glm-5
    batch-processor: qwen3-coder-next

  aliases:
    fast: qwen3-coder-next
    balanced: kimi-k2.5
    powerful: glm-5
    cheap: qwen3-coder-next

  complexity_routing:
    low:
      model: qwen3-coder-next
      max_tokens: 4096
    medium:
      model: kimi-k2.5
      max_tokens: 8192
    high:
      model: glm-5
      max_tokens: 16384

api_endpoints:
  default:
    base_url: ${API_BASE_URL}
    api_key_env: API_KEY
    models:
      - glm-5
      - kimi-k2.5
      - qwen3-coder-next
